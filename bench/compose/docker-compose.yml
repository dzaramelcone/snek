services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: snek
      POSTGRES_PASSWORD: snek
      POSTGRES_DB: snek
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
  bench:
    build: .
    # Convenience only. Do not use this published port for throughput numbers on
    # Docker Desktop; benchmark over the internal compose network instead.
    ports:
      - "8080:8080"
    working_dir: /bench
    command: sleep infinity
    privileged: true
    depends_on:
      - postgres
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: snek
      PG_PASS: snek
      PG_DB: snek
    volumes:
      - ../../python:/bench/snek_root
      - ../../zig-out/lib:/bench/snek_lib:ro
      - ./snek_app.py:/bench/snek_app.py:ro
      - ../scenarios:/bench/scenarios:ro
  may-minihttp:
    build: ../may-minihttp
    ports:
      - "8081:8080"
    privileged: true
    cpus: 14
    depends_on:
      - postgres
    environment:
      DATABASE_URL: "postgres://snek:snek@postgres/snek"
